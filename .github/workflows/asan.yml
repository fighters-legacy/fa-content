name: Sanitizers

# Manual-only until there is code to sanitize: with zero build targets and
# zero tests this workflow was green vacuously. The push/pull_request
# triggers are restored by the Phase 1 skeleton PR (see docs/roadmap.md).
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang

      - name: Configure
        run: cmake --preset asan
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: cmake --build --preset asan

      - name: Test
        run: ctest --preset asan --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

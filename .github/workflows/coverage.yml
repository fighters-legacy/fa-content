name: Coverage

# Manual-only until there is code to measure: with zero build targets and
# zero tests this workflow uploaded nothing. The push/pull_request triggers
# are restored by the Phase 1 skeleton PR (see docs/roadmap.md).
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake lcov

      - name: Configure
        run: cmake --preset coverage

      - name: Build
        run: cmake --build --preset coverage

      - name: Test
        run: ctest --preset coverage --output-on-failure

      - name: Generate lcov report
        run: |
          lcov --capture --directory . --output-file coverage.info \
               --ignore-errors empty
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/vendor/*' \
               --output-file coverage.info --ignore-errors empty,unused

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

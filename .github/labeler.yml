"component: bridge":
  - changed-files:
    - any-glob-to-any-file: ["bridge/**", "include/bridge/**", "tests/**", "packaging/**"]

"component: transcode":
  - changed-files:
    - any-glob-to-any-file: ["transcode/**"]

"component: build":
  - changed-files:
    - any-glob-to-any-file: ["CMakeLists.txt", "CMakePresets.json", "cmake/**", "extern/**"]

"component: ci":
  - changed-files:
    - any-glob-to-any-file: [".github/workflows/**", ".github/dependabot.yml"]

"component: docs":
  - changed-files:
    - any-glob-to-any-file: ["docs/**", "*.md"]
